<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8" />
<!-- Security-first: this CSP makes it impossible for the app to contact any
     network (connect-src 'none'), load any external script/style/image, or be
     framed. The app is fully self-contained and local-only by enforcement,
     not just by convention. -->
<meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'unsafe-inline'; style-src 'unsafe-inline'; img-src data: 'self'; manifest-src 'self'; worker-src 'self'; connect-src 'none'; base-uri 'none'; form-action 'none'; frame-ancestors 'none';" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
<meta name="theme-color" content="#1FA97E" />
<meta name="description" content="Vita — your personal health assistant. Personalized daily health requirements based on your body, budget, and where you live. Works offline, no account, your data stays on your device." />
<link rel="manifest" href="manifest.json" />
<title>Vita — Personal Health Assistant</title>
<!-- Inline SVG favicon (data URI) — no external requests, security-first -->
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='16' fill='%231FA97E'/%3E%3Cpath d='M32 48s-14-8.6-14-19a8 8 0 0 1 14-5.3A8 8 0 0 1 46 29c0 10.4-14 19-14 19z' fill='white'/%3E%3C/svg%3E" />
<style>
/* =========================================================================
   VITA — Design tokens (calm teal-green wellness system, offline-safe)
   ========================================================================= */
:root {
  --primary:#1FA97E; --primary-dark:#157A5C; --accent:#F5A623; --secondary:#5BC0BE;
  --success:#2E9E6B; --warning:#E6A100; --danger:#E0533D;
  --background:#F4F7F6; --surface:#FFFFFF; --text-primary:#16302B; --text-muted:#6B7C77;
  --border:#E1E8E5; --ring-track:#E1E8E5; --ring-fill:#1FA97E;
  --primary-soft:rgba(31,169,126,0.08); --accent-soft:rgba(245,166,35,0.12);
  --secondary-soft:rgba(91,192,190,0.10);

  --space-1:4px; --space-2:8px; --space-3:12px; --space-4:16px; --space-5:24px; --space-6:32px; --space-7:48px;
  --radius-sm:8px; --radius-md:14px; --radius-lg:24px; --radius-full:999px;
  --shadow-sm:0 1px 2px rgba(22,48,43,.06), 0 2px 8px rgba(22,48,43,.05);
  --shadow-md:0 4px 12px rgba(22,48,43,.08), 0 8px 24px rgba(22,48,43,.06);
  --font-sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,"Helvetica Neue",sans-serif;
}
:root[data-theme="dark"] {
  --primary:#2FC093; --primary-dark:#25A07A; --accent:#FFB740; --secondary:#4FB3B1;
  --success:#3FB97F; --warning:#F2B33D; --danger:#F0705B;
  --background:#0F1715; --surface:#182320; --text-primary:#ECF2EF; --text-muted:#93A39D;
  --border:#26332F; --ring-track:#26332F; --ring-fill:#2FC093;
  --primary-soft:rgba(47,192,147,0.12); --accent-soft:rgba(255,183,64,0.14);
  --secondary-soft:rgba(79,179,177,0.12);
  --shadow-sm:0 1px 2px rgba(0,0,0,.3); --shadow-md:0 6px 18px rgba(0,0,0,.4);
}

* { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html,body { margin:0; padding:0; overflow-x:hidden; }
/* Allow flex text containers to shrink & wrap instead of forcing overflow */
.ci-body, .tip > div, .opt-body, .list-clean li span:first-child { min-width:0; overflow-wrap:break-word; }
.rw-text { flex:1 1 auto; min-width:0; overflow-wrap:break-word; }
body {
  font-family:var(--font-sans); background:var(--background); color:var(--text-primary);
  font-size:16px; line-height:1.5; -webkit-font-smoothing:antialiased;
  overscroll-behavior-y:contain;
}
h1,h2,h3 { margin:0 0 var(--space-2); letter-spacing:-.01em; }
h1 { font-size:1.75rem; font-weight:700; line-height:1.2; }
h2 { font-size:1.375rem; font-weight:600; line-height:1.25; }
h3 { font-size:1.125rem; font-weight:600; line-height:1.3; }
p { margin:0 0 var(--space-3); }
small,.small { font-size:.8125rem; font-weight:500; line-height:1.4; }
.muted { color:var(--text-muted); }
button { font-family:inherit; }
:focus-visible { outline:none; box-shadow:0 0 0 3px rgba(31,169,126,.45); border-radius:var(--radius-sm); }

/* App shell — phone column centered on desktop */
#app { max-width:480px; margin:0 auto; min-height:100vh; min-height:100dvh; background:var(--background);
  position:relative; box-shadow:var(--shadow-md); }
@media (min-width:520px){ body{ padding:0; } #app{ min-height:100vh; } }

/* Top app bar */
.appbar { position:sticky; top:0; z-index:20; height:56px; display:flex; align-items:center; justify-content:space-between;
  padding:0 var(--space-4); background:var(--surface); border-bottom:1px solid transparent; transition:border-color .2s;
  padding-top:env(safe-area-inset-top); }
.appbar.scrolled { border-bottom-color:var(--border); }
.appbar h2 { margin:0; }
.iconbtn { width:44px; height:44px; display:grid; place-items:center; border:none; background:transparent; color:var(--text-primary);
  border-radius:var(--radius-full); cursor:pointer; transition:background .15s; }
.iconbtn:active { background:var(--primary-soft); }
.iconbtn svg { width:24px; height:24px; }

/* Page area */
.page { padding:var(--space-4) var(--space-4) 96px; display:none; animation:fade .24s ease; }
.page.active { display:block; }
@keyframes fade { from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:none;} }

/* Cards */
.card { background:var(--surface); border-radius:var(--radius-md); padding:var(--space-4); box-shadow:var(--shadow-sm);
  margin-bottom:var(--space-3); }
.card.flat { box-shadow:none; border:1px solid var(--border); }

/* Buttons */
.btn { display:inline-flex; align-items:center; justify-content:center; gap:var(--space-2); width:100%; height:52px;
  border-radius:var(--radius-md); font-size:1rem; font-weight:600; border:none; cursor:pointer;
  background:var(--primary); color:#fff; box-shadow:var(--shadow-sm); transition:transform .12s ease, box-shadow .12s, background .15s; padding:0 24px; }
.btn:hover { background:var(--primary-dark); }
.btn:active { transform:scale(.98); box-shadow:none; }
.btn:disabled { opacity:.4; box-shadow:none; cursor:not-allowed; }
.btn.secondary { background:transparent; color:var(--primary); border:1.5px solid var(--primary); box-shadow:none; }
.btn.secondary:active { background:var(--primary-soft); }
.btn.ghost { background:transparent; color:var(--primary); box-shadow:none; width:auto; height:44px; padding:0 var(--space-3); }
.btn.danger { background:transparent; color:var(--danger); border:1.5px solid var(--danger); box-shadow:none; }
.btn.sm { height:40px; font-size:.9rem; width:auto; padding:0 var(--space-4); }

/* Inputs */
.field { margin-bottom:var(--space-4); }
.field label { display:block; font-size:.8125rem; font-weight:600; color:var(--text-muted); margin-bottom:var(--space-2);
  text-transform:uppercase; letter-spacing:.02em; }
.input, select.input { width:100%; height:52px; border-radius:var(--radius-sm); border:1.5px solid var(--border);
  background:var(--surface); color:var(--text-primary); padding:0 var(--space-4); font-size:16px; font-family:inherit; }
.input:focus, select.input:focus { outline:none; border-color:var(--primary); box-shadow:0 0 0 3px rgba(31,169,126,.15); }
.row2 { display:grid; grid-template-columns:1fr 1fr; gap:var(--space-3); }
.suffix-wrap { position:relative; }
.suffix-wrap .suffix { position:absolute; right:var(--space-4); top:50%; transform:translateY(-50%); color:var(--text-muted); font-size:.9rem; pointer-events:none; }

/* Option cards (selectable) */
.options { display:flex; flex-direction:column; gap:var(--space-3); }
.opt { display:flex; align-items:center; gap:var(--space-3); width:100%; text-align:left; min-height:64px;
  border:1.5px solid var(--border); background:var(--surface); border-radius:var(--radius-md); padding:var(--space-4);
  cursor:pointer; transition:border-color .16s, background .16s, transform .16s; color:var(--text-primary); }
.opt:active { transform:scale(.99); }
.opt[aria-pressed="true"] { border-color:var(--primary); border-width:2px; background:var(--primary-soft); }
.opt .opt-ico { width:40px; height:40px; flex:none; border-radius:var(--radius-sm); display:grid; place-items:center;
  background:var(--primary-soft); font-size:22px; }
.opt[aria-pressed="true"] .opt-ico { animation:pop .25s ease; }
.opt .opt-body { flex:1; }
.opt .opt-title { font-weight:600; }
.opt .opt-sub { font-size:.8125rem; color:var(--text-muted); }
.opt .opt-check { width:22px; height:22px; flex:none; color:var(--primary); opacity:0; transition:opacity .16s; }
.opt[aria-pressed="true"] .opt-check { opacity:1; }
@keyframes pop { 0%{transform:scale(1);} 50%{transform:scale(1.14);} 100%{transform:scale(1);} }

/* Sliders */
.slider-field { margin-bottom:var(--space-5); }
.slider-head { display:flex; justify-content:space-between; align-items:baseline; margin-bottom:var(--space-2); }
.slider-val { font-weight:700; color:var(--primary); }
input[type=range] { -webkit-appearance:none; appearance:none; width:100%; height:8px; border-radius:var(--radius-full);
  background:var(--ring-track); outline:none; }
input[type=range]::-webkit-slider-thumb { -webkit-appearance:none; width:26px; height:26px; border-radius:50%;
  background:var(--primary); cursor:pointer; box-shadow:var(--shadow-sm); border:3px solid var(--surface); }
input[type=range]::-moz-range-thumb { width:26px; height:26px; border-radius:50%; background:var(--primary);
  cursor:pointer; border:3px solid var(--surface); }

/* Bottom tab nav */
.tabbar { position:fixed; left:50%; transform:translateX(-50%); bottom:0; width:100%; max-width:480px; z-index:30;
  height:calc(64px + env(safe-area-inset-bottom)); padding-bottom:env(safe-area-inset-bottom);
  display:flex; background:var(--surface); border-top:1px solid var(--border); }
.tab { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2px;
  border:none; background:transparent; color:var(--text-muted); cursor:pointer; font-size:11px; font-weight:600; }
.tab svg { width:24px; height:24px; }
.tab[aria-selected="true"] { color:var(--primary); }
.tab.hidden { display:none; }

/* Progress ring */
.ring-wrap { display:flex; align-items:center; gap:var(--space-5); }
.ring { position:relative; width:120px; height:120px; flex:none; }
.ring svg { transform:rotate(-90deg); }
.ring .track { stroke:var(--ring-track); }
.ring .fill { stroke:var(--ring-fill); stroke-linecap:round; transition:stroke-dashoffset .6s cubic-bezier(.22,1,.36,1); }
.ring .center { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; }
.ring .center b { font-size:1.6rem; line-height:1; }
.ring .center span { font-size:.75rem; color:var(--text-muted); }

/* Streak pill */
.pill { display:inline-flex; align-items:center; gap:6px; padding:6px 12px; border-radius:var(--radius-full);
  background:var(--accent-soft); color:var(--accent); font-weight:700; font-size:.9rem; }

/* Checklist */
.check-item { display:flex; align-items:flex-start; gap:var(--space-3); padding:var(--space-4); min-height:56px;
  background:var(--surface); border-radius:var(--radius-md); box-shadow:var(--shadow-sm); margin-bottom:var(--space-3);
  cursor:pointer; transition:background .2s, transform .12s; }
.check-item:active { transform:scale(.99); }
.check-box { width:28px; height:28px; flex:none; border-radius:50%; border:2px solid var(--border); display:grid; place-items:center;
  transition:background .15s, border-color .15s; margin-top:2px; }
.check-box svg { width:16px; height:16px; color:#fff; stroke-dasharray:24; stroke-dashoffset:24; transition:stroke-dashoffset .2s ease-out; }
.check-item.done .check-box { background:var(--success); border-color:var(--success); animation:pop .25s ease; }
.check-item.done .check-box svg { stroke-dashoffset:0; }
.check-item.done { background:var(--primary-soft); }
.check-item.done .ci-title { color:var(--text-muted); text-decoration:line-through; }
.ci-body { flex:1; }
.ci-title { font-weight:600; }
.ci-target { font-size:.8125rem; color:var(--text-muted); }
.ci-cat { font-size:.7rem; text-transform:uppercase; letter-spacing:.04em; font-weight:700; color:var(--secondary); }

/* Tip card */
.tip { background:var(--secondary-soft); border-radius:var(--radius-lg); padding:var(--space-5); display:flex; gap:var(--space-3);
  margin-bottom:var(--space-3); }
.tip .tip-ico { font-size:24px; flex:none; }
.tip h3 { margin-bottom:4px; }
.tip p { margin:0; font-size:.92rem; }

/* Stat grid */
.stat-grid { display:grid; grid-template-columns:1fr 1fr; gap:var(--space-3); margin-bottom:var(--space-3); }
.stat { background:var(--surface); border-radius:var(--radius-md); padding:var(--space-4); box-shadow:var(--shadow-sm); }
.stat b { font-size:1.5rem; color:var(--primary); display:block; }
.stat span { font-size:.8125rem; color:var(--text-muted); }

/* Segmented control */
.segmented { display:flex; background:var(--background); border-radius:var(--radius-full); padding:4px; gap:4px; }
.segmented button { flex:1; border:none; background:transparent; color:var(--text-muted); font-weight:600; font-size:.9rem;
  padding:8px; border-radius:var(--radius-full); cursor:pointer; transition:all .15s; }
.segmented button[aria-pressed="true"] { background:var(--surface); color:var(--text-primary); box-shadow:var(--shadow-sm); }

/* Section label */
.section-label { font-size:.8125rem; font-weight:700; text-transform:uppercase; letter-spacing:.04em; color:var(--text-muted);
  margin:var(--space-5) 0 var(--space-3); }
.section-label:first-child { margin-top:0; }

/* Onboarding overlay */
#onboarding { position:fixed; inset:0; z-index:50; background:var(--background); display:none; flex-direction:column;
  max-width:480px; margin:0 auto; }
#onboarding.active { display:flex; }
.ob-progress { height:4px; display:flex; gap:4px; padding:var(--space-4) var(--space-4) 0; }
.ob-progress span { flex:1; height:4px; border-radius:var(--radius-full); background:var(--border); overflow:hidden; }
.ob-progress span i { display:block; height:100%; width:0; background:var(--primary); transition:width .3s ease; }
.ob-progress span.filled i { width:100%; }
.ob-body { flex:1; overflow-y:auto; padding:var(--space-5) var(--space-4) var(--space-4); }
.ob-step { display:none; animation:slideIn .24s ease; }
.ob-step.active { display:block; }
@keyframes slideIn { from{opacity:0; transform:translateX(12px);} to{opacity:1; transform:none;} }
.ob-foot { padding:var(--space-4); padding-bottom:calc(var(--space-4) + env(safe-area-inset-bottom)); display:flex; gap:var(--space-3);
  align-items:center; border-top:1px solid var(--border); background:var(--surface); }
.ob-foot .btn { flex:1; }
.hero-ico { width:72px; height:72px; border-radius:var(--radius-lg); background:var(--primary-soft); display:grid; place-items:center;
  font-size:36px; margin-bottom:var(--space-4); }

/* Disclaimer / alert */
.alert { border-radius:var(--radius-md); padding:var(--space-4); margin-bottom:var(--space-3); font-size:.9rem; }
.alert.warn { background:var(--accent-soft); color:var(--text-primary); border:1px solid var(--accent); }
.alert.danger { background:rgba(224,83,61,.1); color:var(--text-primary); border:1px solid var(--danger); }
.alert b { display:block; margin-bottom:4px; }

/* Bar chart (weight trend) */
.spark { width:100%; height:120px; }
.spark .axis { stroke:var(--border); stroke-width:1; }
.spark .line { fill:none; stroke:var(--primary); stroke-width:2.5; stroke-linejoin:round; stroke-linecap:round; }
.spark .dot { fill:var(--primary); }
.spark .target { stroke:var(--accent); stroke-width:1.5; stroke-dasharray:4 4; fill:none; }

/* Heatmap */
.heat { display:grid; grid-template-columns:repeat(7,1fr); gap:5px; }
.heat .cell { aspect-ratio:1; border-radius:5px; background:var(--border); }
.heat .cell.l1 { background:rgba(31,169,126,.35); }
.heat .cell.l2 { background:rgba(31,169,126,.65); }
.heat .cell.l3 { background:var(--primary); }
.heat .cell.future { background:transparent; }

/* Range bars (body composition) */
.range-row { margin-bottom:var(--space-4); }
.range-head { display:flex; justify-content:space-between; align-items:baseline; margin-bottom:6px; }
.range-head .rl { font-weight:600; font-size:.95rem; }
.range-head .rv { font-weight:700; }
.range-bar { position:relative; height:10px; border-radius:var(--radius-full); overflow:hidden; background:var(--border); }
.range-bar .zone { position:absolute; top:0; bottom:0; }
.range-bar .zone.normal { background:var(--primary-soft); }
.range-marker { position:absolute; top:-3px; width:4px; height:16px; border-radius:2px; background:var(--text-primary);
  transform:translateX(-50%); }
.range-tag { font-size:.72rem; font-weight:700; text-transform:uppercase; letter-spacing:.03em; padding:2px 8px; border-radius:var(--radius-full); }
.range-tag.low { background:rgba(91,192,190,.18); color:var(--secondary); }
.range-tag.normal { background:var(--primary-soft); color:var(--primary); }
.range-tag.high { background:var(--accent-soft); color:var(--accent); }

/* Meal plan */
.meal { display:flex; gap:var(--space-3); padding:var(--space-3) 0; border-bottom:1px solid var(--border); }
.meal:last-child { border-bottom:none; }
.meal .meal-ico { font-size:22px; flex:none; width:32px; text-align:center; }
.meal .meal-name { font-weight:600; }
.meal .meal-foods { font-size:.85rem; color:var(--text-muted); }
.meal .meal-kcal { font-size:.8rem; color:var(--primary); font-weight:700; white-space:nowrap; }

/* Water quick-counter */
.water-count { font-weight:700; font-size:1.1rem; }
.water-bar { height:10px; border-radius:var(--radius-full); background:var(--ring-track); overflow:hidden; margin:12px 0; }
.water-bar span { display:block; height:100%; background:var(--secondary); transition:width .45s cubic-bezier(.22,1,.36,1); }
.water-btns { display:flex; gap:var(--space-3); }
.water-btn { height:48px; border-radius:var(--radius-md); border:1.5px solid var(--border); background:var(--surface);
  color:var(--text-primary); font-size:1.05rem; font-weight:700; cursor:pointer; transition:transform .12s, background .15s; }
.water-btn:active { transform:scale(.97); }
.water-btn#water-minus { width:56px; flex:none; }
.water-btn.add { flex:1; background:var(--secondary-soft); color:var(--secondary); border-color:transparent; }
.water-btn:disabled { opacity:.4; cursor:not-allowed; }

/* misc */
.center { text-align:center; }
.mt { margin-top:var(--space-4); }
.divider { height:1px; background:var(--border); margin:var(--space-4) 0; }
.chiprow { display:flex; flex-wrap:wrap; gap:var(--space-2); }
.chip { padding:6px 12px; border-radius:var(--radius-full); background:var(--background); border:1px solid var(--border);
  font-size:.85rem; }
.list-clean { list-style:none; padding:0; margin:0; }
.list-clean li { padding:var(--space-2) 0; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; gap:var(--space-3); }
.list-clean li:last-child { border-bottom:none; }
.toast { position:fixed; left:50%; bottom:84px; transform:translateX(-50%) translateY(20px); background:var(--text-primary);
  color:var(--background); padding:12px 18px; border-radius:var(--radius-full); font-size:.9rem; font-weight:600; opacity:0;
  transition:all .25s; z-index:60; pointer-events:none; max-width:90%; text-align:center; }
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

@media (prefers-reduced-motion: reduce){ *{ animation:none !important; transition:none !important; } }
</style>
</head>
<body>
<div id="app">
  <!-- ===================== ONBOARDING ===================== -->
  <div id="onboarding">
    <div class="ob-progress" id="obProgress"></div>
    <div class="ob-body" id="obBody"><!-- steps injected --></div>
    <div class="ob-foot">
      <button class="btn ghost" id="obBack" style="flex:0 0 auto; display:none;">Back</button>
      <button class="btn" id="obNext">Continue</button>
    </div>
  </div>

  <!-- ===================== MAIN APP ===================== -->
  <header class="appbar" id="appbar">
    <h2 id="barTitle">Today</h2>
    <button class="iconbtn" id="themeToggle" aria-label="Toggle dark mode" title="Toggle theme">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
  </header>

  <main>
    <section class="page active" id="page-today" role="tabpanel" aria-labelledby="tab-today" tabindex="0"></section>
    <section class="page" id="page-plan" role="tabpanel" aria-labelledby="tab-plan" tabindex="0"></section>
    <section class="page" id="page-insights" role="tabpanel" aria-labelledby="tab-insights" tabindex="0"></section>
    <section class="page" id="page-profile" role="tabpanel" aria-labelledby="tab-profile" tabindex="0"></section>
  </main>

  <nav class="tabbar" id="tabbar" role="tablist" aria-label="Main sections">
    <button class="tab" id="tab-today" role="tab" aria-controls="page-today" aria-selected="true" data-tab="today">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M9 11l3 3 8-8" stroke-linecap="round" stroke-linejoin="round"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <span>Today</span>
    </button>
    <button class="tab" id="tab-plan" role="tab" aria-controls="page-plan" aria-selected="false" data-tab="plan">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M9 5h11M9 12h11M9 19h11M4 5h.01M4 12h.01M4 19h.01" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <span>Plan</span>

const STORE = "vita_state_v1";
const todayKey = () => new Date().toISOString().slice(0,10);

function loadState(){

  catch(e){ return null; }
}
function saveState(){ localStorage.setItem(STORE, JSON.stringify(state)); }

let state = loadState();

/* =========================================================================
   i18n — English + Traditional Chinese (Taiwan). curLang() reads appLang.
   Values may be strings or functions (for interpolation): t("k")(args).
   ========================================================================= */
function defaultLang(){ try{ return (navigator.language||"").toLowerCase().indexOf("zh")===0 ? "zh" : "en"; }catch(e){ return "en"; } }
let appLang = (state && state.lang) ? state.lang : defaultLang();
function curLang(){ return appLang || "en"; }
function L(){ return I18N[curLang()] || I18N.en; }
function t(k){ const d=L(); return (d[k]!==undefined) ? d[k] : (I18N.en[k]!==undefined ? I18N.en[k] : k); }
function setLang(l){
  appLang = l;
  if(state){ state.lang = l; saveState(); }
  document.documentElement.setAttribute("lang", l==="zh" ? "zh-Hant" : "en");
}

/* =========================================================================
   HEALTH ENGINE  (validated against clinical-nutrition expert guidance)
   ========================================================================= */
const ACTIVITY = { sedentary:1.2, light:1.375, moderate:1.55, very:1.725, athlete:1.9 };

function bmi(kg, cm){ const m=cm/100; return kg/(m*m); }

function mifflinBMR({weight,height,age,sex}){
  const base = 10*weight + 6.25*height - 5*age;
  return Math.round(base + (sex==="male" ? 5 : -161));
}

// PBF healthy bands by sex
function pbfBand(pbf, sex){
  if(pbf==null) return null;
  if(sex==="male") return pbf<10?"low":pbf>25?"obese":pbf>20?"high":"healthy";
  return pbf<18?"low":pbf>32?"obese":pbf>28?"high":"healthy";
}

// Auto goal detection — BMI or low body-fat routes underweight/lean users to GAIN
function detectGoal(p){
  const b = bmi(p.weight, p.height);
  const band = pbfBand(p.bodyFat, p.sex);
  if(b < 18.5 || band==="low") return "gain";
  if(b >= 30 || band==="obese") return "lose";
  if(b >= 25 && band==="high") return "lose";
  if(b >= 25) return "maintain";      // muscular / healthy fat
  return "maintain";
}

const GOAL_META = {
  gain:    { label:"Gain healthy weight & build muscle", icon:"🌱", calAdj:+0.15, weekly:"+0.25–0.5 kg/wk",
             protein:[1.6,2.2], fat:[0.8,1.0] },
  maintain:{ label:"Maintain & stay strong", icon:"⚖️", calAdj:0, weekly:"±0",
             protein:[1.4,1.8], fat:[0.8,1.0] },
  lose:    { label:"Lose fat, keep muscle", icon:"🔥", calAdj:-0.18, weekly:"−0.5–0.75 kg/wk",
             protein:[1.8,2.4], fat:[0.6,0.8] }
}

function compute(p){
  const b = bmi(p.weight, p.height);
  const bmr = mifflinBMR(p);
  const tdee = Math.round(bmr * (ACTIVITY[p.activity]||1.55));
  const goal = p.goalOverride || detectGoal(p);
  const gm = GOAL_META[goal];
  const calories = Math.round(tdee * (1 + gm.calAdj));
  // protein/fat from g/kg midpoint, carbs as remainder
  const proteinG = Math.round(p.weight * (gm.protein[0]+gm.protein[1])/2);
  const fatG = Math.round(p.weight * (gm.fat[0]+gm.fat[1])/2);
  const carbG = Math.max(0, Math.round((calories - proteinG*4 - fatG*9)/4));
  // hydration: 35 ml/kg + climate
  let hydration = p.weight * 35;
  if(p.climate==="hot") hydration += 750;
  if(p.climate==="cold") hydration += 0; // baseline but reminders matter
  hydration = Math.round(hydration/50)*50;
  return { bmi:b, bmr, tdee, goal, gm, calories, proteinG, fatG, carbG, hydration,
           pbfBand:pbfBand(p.bodyFat,p.sex) };
}

/* ---------- Red-flag safety screen ---------- */
function redFlags(p){
  const flags=[]; const b=bmi(p.weight,p.height);
  if(p.age < 18) flags.push(t("rf_under18"));
  if(b < 16) flags.push(t("rf_bmi16"));
  if(b >= 35) flags.push(t("rf_bmi35"));
  if(p.feelings && p.feelings.energy<=2 && p.feelings.sleep<=2) flags.push(t("rf_lowenergy"));
  return flags;
}

/* =========================================================================
   CHECKLIST GENERATOR — daily requirements per goal, tuned by budget/climate
   ========================================================================= */
function buildChecklist(p, c){
  const out = []; // {id, cat, title, target}  — cat is a stable key; display via catLabel()
  const water = (c.hydration/1000).toFixed(1);
  const mealCount = c.goal==="gain" ? "4–5" : "3–4";

  // Nutrition + protein
  if(c.goal==="gain"){
    out.push({id:"cal", cat:"Nutrition", title:t("ck_cal_gain_t"), target:t("ck_cal_gain_d")(c.calories, mealCount)});
    out.push({id:"snack", cat:"Nutrition", title:t("ck_snack_t"), target:t("ck_snack_d")});
  } else if(c.goal==="lose"){
    out.push({id:"cal", cat:"Nutrition", title:t("ck_cal_lose_t"), target:t("ck_cal_lose_d")(c.calories)});
    out.push({id:"fiber", cat:"Nutrition", title:t("ck_fiber_t"), target:t("ck_fiber_d")});
  } else {
    out.push({id:"cal", cat:"Nutrition", title:t("ck_cal_maintain_t"), target:t("ck_cal_maintain_d")(c.calories)});
  }
  out.push({id:"protein", cat:"Protein", title:t("ck_protein_t")(c.proteinG), target:t("ck_protein_d")(Math.round(c.proteinG/(c.goal==="gain"?5:4)))});

  // Hydration
  out.push({id:"water", cat:"Hydration", title:t("ck_water_t")(water), target: p.climate==="hot" ? t("ck_water_d_hot") : p.climate==="cold" ? t("ck_water_d_cold") : t("ck_water_d_temp")});

  // Training
  if(c.goal==="gain"){
    out.push({id:"train", cat:"Movement", title:t("ck_train_gain_t"), target:t("ck_train_gain_d")});
    out.push({id:"creatine", cat:"Movement", title:t("ck_creatine_t"), target:t("ck_creatine_d")});
  } else if(c.goal==="lose"){
    out.push({id:"train", cat:"Movement", title:t("ck_train_lose_t"), target:t("ck_train_lose_d")});
    out.push({id:"steps", cat:"Movement", title:t("ck_steps_t"), target:t("ck_steps_d")});
  } else {
    out.push({id:"train", cat:"Movement", title:t("ck_train_maintain_t"), target:t("ck_train_maintain_d")});
  }
  out.push({id:"mobility", cat:"Movement", title:t("ck_mobility_t"), target:t("ck_mobility_d")});

  // Sleep + recovery + mind
  out.push({id:"sleep", cat:"Recovery", title:t("ck_sleep_t"), target: c.goal==="gain" ? t("ck_sleep_d_gain") : t("ck_sleep_d_other")});
  if(p.feelings && p.feelings.stress>=7) out.push({id:"calm", cat:"Mind", title:t("ck_calm_t"), target:t("ck_calm_d")});

  // Weekly
  out.push({id:"weighin", cat:"Weekly", title:t("ck_weighin_t"), target:t("ck_weighin_d")(weeklyLabel(c.goal))});

  return out;
}

/* ---------- Sample one-day meal plan (budget + goal + language aware) ---------- */
function sampleMealPlan(p, c){
  const D=L();
  const ps = D.protein_src[p.budget]||D.protein_src.medium;
  const cs = D.carb_src[p.budget]||D.carb_src.medium;
  const J = D.meal_join;
  const join = (arr)=>arr.filter(Boolean).map(cap).join(J);   // cap() is a no-op for non-Latin text
  const gain = c.goal==="gain", lose = c.goal==="lose";
  const meals = gain ? [
    {ico:"🌅", name:t("mn_bigbreakfast"), foods:join([cs[0], ps[1], ps[4]||t("w_nutbutter"), t("w_banana")]), frac:.22},
    {ico:"🥪", name:t("mn_midmorning"), foods:join([ps[0], cs[4]||t("w_bread")]), frac:.13},
    {ico:"🍽️", name:t("mn_lunch"), foods:join([cs[1], ps[3]||ps[0], t("w_oliveoil"), t("w_veg")]), frac:.25},
    {ico:"🥤", name:t("mn_smoothie"), foods:join([ps[1], cs[0], ps[5]||t("w_whey"), ps[4]||t("w_nutbutter")]), frac:.16},
    {ico:"🌙", name:t("mn_dinner"), foods:join([ps[2]||ps[0], cs[2]||cs[1], t("w_greens")]), frac:.24}
  ] : lose ? [
    {ico:"🌅", name:t("mn_breakfast"), foods:join([ps[1], t("w_berries"), cs[2]||cs[0], t("w_small")]), frac:.25},
    {ico:"🍽️", name:t("mn_lunch"), foods:join([ps[0], t("w_bigsalad"), cs[1]]), frac:.32},
    {ico:"🍎", name:t("mn_snack"), foods:join([ps[3]||ps[0], t("w_fruitveg")]), frac:.13},
    {ico:"🌙", name:t("mn_dinner"), foods:join([ps[2]||ps[0], t("w_lotsveg"), cs[0]]), frac:.30}
  ] : [
    {ico:"🌅", name:t("mn_breakfast"), foods:join([cs[0], ps[1], t("w_fruit")]), frac:.27},
    {ico:"🍽️", name:t("mn_lunch"), foods:join([ps[0], cs[1], t("w_veg")]), frac:.34},
    {ico:"🍎", name:t("mn_snack"), foods:join([ps[3]||ps[0], t("w_nuts")]), frac:.12},
    {ico:"🌙", name:t("mn_dinner"), foods:join([ps[2]||ps[0], cs[2]||cs[1], t("w_greens")]), frac:.27}
  ];
  return meals.map(m=>({...m, kcal:Math.round(c.calories*m.frac/10)*10, protein:Math.round(c.proteinG*m.frac)}));
}

/* =========================================================================
   TIPS — pulled from the active language dictionary (L().tips)
   ========================================================================= */
function tipFor(goal, day){
  const T = L().tips || TIPS_EN;
  const pool = (T[goal]||T.maintain).concat(T.general);
  return pool[((day % pool.length)+pool.length) % pool.length];
}

/* =========================================================================
   PROGRESS / STREAK
   ========================================================================= */
function ensureToday(){
  if(!state.progress) state.progress={};
  const k=todayKey();
  if(!state.progress[k]) state.progress[k]={};
  return state.progress[k];
}
function dayCompletion(k){
  const p=state.progress && state.progress[k]; if(!p) return 0;
  const total = state.checklist.length; if(!total) return 0;
  // count only real checklist items (ignore non-task keys like waterGlasses)
  const done = state.checklist.filter(it=>p[it.id]).length;
  return done/total;
}
const GLASS_ML = 250;
function waterTarget(){ const c=compute(state.profile); return Math.max(1, Math.round(c.hydration/GLASS_ML)); }
function streak(){
  let s=0; const d=new Date();
  for(;;){
    const k=d.toISOString().slice(0,10);
    if(dayCompletion(k) >= 0.6){ s++; d.setDate(d.getDate()-1); }
    else { // today not yet done shouldn't break streak
      if(k===todayKey()){ d.setDate(d.getDate()-1); continue; }
      break;
    }
  }
  return s;
}

/* =========================================================================
   RENDERING
   ========================================================================= */
const $ = (s,el=document)=>el.querySelector(s);
const $$ = (s,el=document)=>[...el.querySelectorAll(s)];
function esc(x){ return String(x).replace(/[&<>"]/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[m])); }

function toast(msg){
  const t=$("#toast"); t.textContent=msg; t.classList.add("show");
  clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove("show"),1800);
}

function ringSVG(pct){
  const r=52, c=2*Math.PI*r, off=c*(1-pct);
  return `<div class="ring"><svg width="120" height="120" viewBox="0 0 120 120">
    <circle class="track" cx="60" cy="60" r="${r}" fill="none" stroke-width="10"/>
    <circle class="fill" cx="60" cy="60" r="${r}" fill="none" stroke-width="10"
      stroke-dasharray="${c.toFixed(1)}" stroke-dashoffset="${off.toFixed(1)}"/>
  </svg><div class="center"><b>${Math.round(pct*100)}%</b><span>${t("ring_done")}</span></div></div>`;
}

function renderToday(){
  const c = compute(state.profile);
  const today = ensureToday();
  today.water = (today.waterGlasses||0) >= waterTarget();   // water requirement is derived from glasses
  const pct = dayCompletion(todayKey());
  const flags = redFlags(state.profile);
  const dayIdx = Math.floor(Date.now()/86400000);
  const tip = tipFor(c.goal, dayIdx);
  const firstName = state.profile.name ? esc(state.profile.name.split(" ")[0]) : t("hi_there");
  const hr = new Date().getHours();
  const greet = hr<12?t("greet_morning"):hr<18?t("greet_afternoon"):t("greet_evening");

  let html = `<p class="muted" style="margin-bottom:2px">${greet},</p><h1>${firstName} 👋</h1>`;

  if(flags.length){
    html += `<div class="alert danger"><b>${t("redflag_header")}</b>${flags.map(f=>`<div>• ${esc(f)}</div>`).join("")}</div>`;
  }

  const doneCount = state.checklist.filter(it=>today[it.id]).length;
  html += `<div class="card"><div class="ring-wrap">${ringSVG(pct)}
    <div class="rw-text"><div class="pill">${t("streak")(streak())}</div>
    <p style="margin:10px 0 0; font-weight:600">${c.gm.icon} ${goalLabel(c.goal)}</p>
    <p class="small muted" style="margin:2px 0 0">${t("reqs_complete")(doneCount, state.checklist.length)}</p></div></div></div>`;

  // Water quick-counter
  const wTarget = waterTarget();
  const glasses = Math.min(wTarget, today.waterGlasses||0);
  const litres = (glasses*GLASS_ML/1000).toFixed(1);
  const targetL = (c.hydration/1000).toFixed(1);
  const wPct = Math.round(glasses/wTarget*100);
  html += `<div class="card water-card">
    <div class="ci-cat" style="color:var(--secondary)">${t("hydration")}</div>
    <div class="water-count">${t("water_count")(glasses, wTarget)}</div>
    <div class="ci-target">${t("water_sub")(litres, targetL, GLASS_ML)}</div>
    <div class="water-bar"><span style="width:${wPct}%"></span></div>
    <div class="water-btns">
      <button class="water-btn" id="water-minus" aria-label="${t("water_minus_aria")}" ${glasses<=0?"disabled":""}>−</button>
      <button class="water-btn add" id="water-plus" aria-label="${t("water_add_aria")}" ${glasses>=wTarget?"disabled":""}>${glasses>=wTarget?t("water_goal"):t("water_add")}</button>
    </div></div>`;

  html += `<div class="section-label">${t("todays_reqs")}</div>`;
  html += state.checklist.filter(item=>item.id!=="water").map(item=>{
    const done = !!today[item.id];
    return `<div class="check-item ${done?"done":""}" data-id="${item.id}" role="button" tabindex="0" aria-pressed="${done}" aria-label="${esc(item.title)}">
      <div class="check-box"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" aria-hidden="true"><path d="M5 13l4 4L19 7" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
      <div class="ci-body"><div class="ci-cat">${catLabel(item.cat)}</div><div class="ci-title">${esc(item.title)}</div>
      <div class="ci-target">${esc(item.target)}</div></div></div>`;
  }).join("");

  html += `<div class="tip"><div class="tip-ico">💡</div><div><h3>${esc(tip.t)}</h3><p>${esc(tip.b)}</p></div></div>`;
  html += `<p class="small muted center mt">${t("edu_disclaimer")}</p>`;

  $("#page-today").innerHTML = html;
  // checklist toggles (mouse + keyboard)
  $$("#page-today .check-item").forEach(el=>{
    const toggle=()=>{ const id=el.dataset.id; const t=ensureToday(); t[id]=!t[id]; saveState(); renderToday(); };
    el.addEventListener("click",toggle);
    el.addEventListener("keydown",(e)=>{ if(e.key===" "||e.key==="Enter"){ e.preventDefault(); toggle(); } });
  });
  // water counter
  const setGlasses=(n)=>{
    const t=ensureToday(); const tgt=waterTarget();
    n=Math.max(0, Math.min(tgt, n));
    const wasBelow=(t.waterGlasses||0)<tgt;
    t.waterGlasses=n; t.water = n>=tgt;       // syncs the "water" requirement
    saveState();
    if(n>=tgt && wasBelow) toast(t("toast_hydration"));
    renderToday();
  };
  $("#water-plus") && $("#water-plus").addEventListener("click",()=>setGlasses((ensureToday().waterGlasses||0)+1));
  $("#water-minus") && $("#water-minus").addEventListener("click",()=>setGlasses((ensureToday().waterGlasses||0)-1));
}

  const c = compute(state.profile);
  let html = `<h1>${t("insights_title")}</h1>`;

  const days=[]; const d=new Date();

  html += `<div class="stat-grid">
    <div class="stat"><b>${avg7}%</b><span>${t("st_7day")}</span></div>
    <div class="stat"><b>🔥 ${bestStreak}</b><span>${t("st_daystreak")}</span></div>
  </div>`;

  // Heatmap 28 days
  html += `<div class="section-label">${t("last4")}</div><div class="card"><div class="heat">`;

  }

    // keep profile.weight in sync with the most recent remaining entry
    if(state.weightLog.length){
      const latest=[...state.weightLog].sort((a,b)=>a.date.localeCompare(b.date)).pop();
      state.profile.weight=latest.kg;

  }));
}

function renderComposition(p){
  const ib = p.inbody;
  let h = `<div class="section-label">${t("comp_title")}</div>`;
  // score + key headline
  if(ib.score!=null){
    h += `<div class="stat-grid">
      <div class="stat"><b>${ib.score}<span style="font-size:.9rem">/100</span></b><span>${t("comp_score")}</span></div>
      <div class="stat"><b>${ib.visceralFat!=null?ib.visceralFat:"—"}</b><span>${t("comp_visceral")} ${ib.visceralFat!=null&&ib.visceralFat<10?t("comp_healthy"):""}</span></div>
    </div>`;
  }
  h += `<div class="card">`;
  Object.keys(INBODY_RANGES).forEach(k=>{
    const r = INBODY_RANGES[k]; const v = r.get(p);
    if(v==null) return;
    const span = r.max - r.min; const lo = r.min - span*0.6, hi = r.max + span*0.6;
    const pct = x => Math.max(0, Math.min(100, (x-lo)/(hi-lo)*100));
    const zoneL = pct(r.min), zoneW = pct(r.max)-pct(r.min);
    const status = v < r.min ? "low" : v > r.max ? "high" : "normal";
    h += `<div class="range-row">
      <div class="range-head"><span class="rl">${t("range_"+k)}</span>
        <span><span class="rv">${v} ${r.unit}</span> <span class="range-tag ${status}">${t("tag_"+status)}</span></span></div>
      <div class="range-bar"><span class="zone normal" style="left:${zoneL}%; width:${zoneW}%"></span>
        <span class="range-marker" style="left:${pct(v)}%"></span></div>
      <div class="range-head small muted" style="margin-top:4px"><span>${r.min}</span><span>${t("comp_normal")}</span><span>${r.max}</span></div>
    </div>`;
  });
  h += `<p class="small muted">${t("comp_caption")}</p></div>`;
  return h;
}

function sparkline(log, target){
  const w=440,h=120,pad=20;
  const ws = log.slice(-12);
  const ys = ws.map(p=>p.kg);
  let min=Math.min(...ys), max=Math.max(...ys);
  if(target){ min=Math.min(min,target); max=Math.max(max,target); }
  if(max-min<2){ max+=1; min-=1; }
  const X=i=> pad + (i*(w-2*pad)/Math.max(1,ws.length-1));
  const Y=v=> h-pad - ((v-min)/(max-min))*(h-2*pad);
  const pts = ws.map((p,i)=>`${X(i).toFixed(1)},${Y(p.kg).toFixed(1)}`).join(" ");
  let tline="";
  if(target){ const ty=Y(target).toFixed(1); tline=`<line class="target" x1="${pad}" y1="${ty}" x2="${w-pad}" y2="${ty}"/>`; }
  const dots = ws.map((p,i)=>`<circle class="dot" cx="${X(i).toFixed(1)}" cy="${Y(p.kg).toFixed(1)}" r="3"/>`).join("");
  return `<svg class="spark" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
    ${tline}<polyline class="line" points="${pts}"/>${dots}</svg>
    <div class="small muted" style="display:flex;justify-content:space-between"><span>${fmtWeight(ws[0].kg)}</span><span>${fmtWeight(ws[ws.length-1].kg)}${target?` · 🎯 ${fmtWeight(target)}`:""}</span></div>`;
}

function cap(s){ return s? s.charAt(0).toUpperCase()+s.slice(1):""; }

/* ---------- Unit conversion (canonical storage is always cm / kg) ---------- */
const LB_PER_KG = 2.2046226218;
function kgToLb(kg){ return kg*LB_PER_KG; }
function lbToKg(lb){ return lb/LB_PER_KG; }
function cmToFtIn(cm){ const t=cm/2.54; let ft=Math.floor(t/12), inch=Math.round(t-ft*12); if(inch===12){ft++;inch=0;} return {ft,inch}; }
function ftInToCm(ft,inch){ return ((+ft||0)*12+(+inch||0))*2.54; }
function units(){ return (state&&state.profile&&state.profile.units)||"metric"; }
function fmtWeight(kg,u){ u=u||units(); if(kg==null||kg==="") return "—"; return u==="imperial" ? (Math.round(kgToLb(kg)*10)/10)+" lb" : (Math.round(kg*10)/10)+" kg"; }
function fmtHeight(cm,u){ u=u||units(); if(!cm) return "—"; if(u==="imperial"){ const {ft,inch}=cmToFtIn(cm); return ft+"′"+inch+"″"; } return Math.round(cm)+" cm"; }
function weightUnit(u){ return (u||units())==="imperial"?"lb":"kg"; }
const MONTHS=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
function fmtDate(iso){ const [y,m,d]=iso.split("-").map(Number); const tk=todayKey();
  if(iso===tk) return t("date_today");
  const yd=new Date(); yd.setDate(yd.getDate()-1); if(iso===yd.toISOString().slice(0,10)) return t("date_yesterday");
  const sameYear = y===new Date().getFullYear();
  if(curLang()==="zh") return (sameYear?"":y+"年")+m+"月"+d+"日";
  return MONTHS[m-1]+" "+d+(sameYear?"":(" "+y)); }

function exportData(){
  const blob=new Blob([JSON.stringify(state,null,2)],{type:"application/json"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a"); a.href=url; a.download="vita-data.json"; a.click();
  URL.revokeObjectURL(url); toast(t("toast_exported"));
}

/* ---------- Plan as plain text (for local share / clipboard) ---------- */
function planAsText(){
  const p=state.profile, c=compute(p);
  const out=[];
  out.push(t("pt_title"));
  if(p.name) out.push(p.name);
  out.push(t("p_goal")+": "+goalLabel(c.goal));
  out.push("");
  out.push(t("daily_targets").toUpperCase());
  out.push("- "+t("st_kcal")+": ~"+c.calories+" kcal");
  out.push("- "+t("st_protein")+": "+c.proteinG+" g");
  out.push("- "+t("st_carbs")+": "+c.carbG+" g");
  out.push("- "+t("st_fat")+": "+c.fatG+" g");
  out.push("- "+t("st_water")+": "+(c.hydration/1000).toFixed(1)+" L");
  out.push("- BMI: "+c.bmi.toFixed(1));
  out.push("");
  out.push(t("your_reqs").toUpperCase());
  state.checklist.forEach(it=>out.push("- "+it.title+"（"+it.target+"）"));
  out.push("");
  out.push(t("sample_day")(c.calories));
  sampleMealPlan(p,c).forEach(m=>out.push("- "+m.name+"："+m.foods+" — ~"+m.kcal+" kcal, "+m.protein+"g"));
  out.push("");
  out.push(t("pt_footer"));
  return out.join("\n");
}
async function sharePlan(){
  const text=planAsText();
  try{ if(navigator.share){ await navigator.share({title:t("pt_title"), text}); return; } }
  catch(e){ if(e && e.name==="AbortError") return; /* else fall through */ }
  try{ await navigator.clipboard.writeText(text); toast(t("toast_plan_copied")); return; }
  catch(e){ /* file:// or insecure context — use legacy fallback */ }
  try{
    const ta=document.createElement("textarea"); ta.value=text;
    ta.style.position="fixed"; ta.style.opacity="0"; document.body.appendChild(ta);
    ta.focus(); ta.select(); const ok=document.execCommand("copy"); document.body.removeChild(ta);
    toast(ok?t("toast_plan_copied2"):t("toast_plan_fail"));
  }catch(e){ toast(t("toast_plan_fail")); }
}

function attachObHandlers(){
  const d=ob.data;
  const bind=(id,prop)=>{ const el=$("#"+id); if(el) el.addEventListener("input",()=>d[prop]=el.value); };
  bind("f-name","name"); bind("f-age","age"); bind("f-bodyfat","bodyFat");
  const act=$("#f-activity"); if(act) act.addEventListener("change",()=>d.activity=act.value);

  // Language toggle (welcome step)
  $$("#ob-lang button").forEach(b=>b.addEventListener("click",()=>{ setLang(b.dataset.lang); applyStaticI18n(); renderOb(); }));
  // Units: toggle re-renders step 1 (canonical cm/kg already stored, so values convert)
  $$("#f-units button").forEach(b=>b.addEventListener("click",()=>{ d.units=b.dataset.v; renderOb(); }));

  // Height — store canonical cm
  const imp = d.units==="imperial";
  if(imp){
    const recalcH=()=>{ const ft=$("#f-height-ft").value, inch=$("#f-height-in").value;
      d.height = (ft==="" && inch==="") ? "" : Math.round(ftInToCm(ft,inch)*10)/10; };
    $("#f-height-ft") && $("#f-height-ft").addEventListener("input",recalcH);
    $("#f-height-in") && $("#f-height-in").addEventListener("input",recalcH);
  } else {
    const h=$("#f-height"); if(h) h.addEventListener("input",()=>d.height=h.value);
  }
  // Weight — store canonical kg
  const w=$("#f-weight"); if(w) w.addEventListener("input",()=>{
    const v=w.value; d.weight = v==="" ? "" : (imp ? Math.round(lbToKg(+v)*10)/10 : +v);
  });

  $("#loadInbody") && $("#loadInbody").addEventListener("click",()=>{
    Object.assign(d, JSON.parse(JSON.stringify(INBODY_PRESET)), {name:d.name});
    toast(t("toast_sample")); renderOb();
  });

  $$("#f-sex button").forEach(b=>b.addEventListener("click",()=>{
    d.sex=b.dataset.v; $$("#f-sex button").forEach(x=>x.setAttribute("aria-pressed",x===b)); }));

  ["energy","sleep","stress"].forEach(k=>{
    const el=$("#f-"+k); if(el) el.addEventListener("input",()=>{ d.feelings[k]=+el.value; $("#sv-"+k).textContent=el.value+"/10"; });
  });

  $$(".opt").forEach(b=>b.addEventListener("click",()=>{
    const g=b.dataset.group; d[g]=b.dataset.v;
    $$(`.opt[data-group="${g}"]`).forEach(x=>x.setAttribute("aria-pressed", x===b));
  }));
}

function validateStep(){
  const d=ob.data;
  if(ob.step===1){
    const age=+d.age, h=+d.height, w=+d.weight;
    if(!age||age<5||age>120){ toast(t("v_age")); return false; }
    if(!h||h<100||h>250){ toast(t("v_height")); return false; }
    if(!w||w<25||w>300){ toast(t("v_weight")); return false; }
  }
  if(ob.step===3 && !d.budget){ toast(t("v_budget")); return false; }
  if(ob.step===4){ if(!d.climate){ toast(t("v_climate")); return false; } if(!d.area){ toast(t("v_area")); return false; } }
  return true;
}

$("#obNext").addEventListener("click",()=>{
  if(!validateStep()) return;
  if(ob.step < OB_STEPS-1){ ob.step++; renderOb(); $(".ob-body").scrollTo(0,0); return; }
  finishOnboarding();
});
$("#obBack").addEventListener("click",()=>{ if(ob.step>0){ ob.step--; renderOb(); } });

function finishOnboarding(){
  const d=ob.data;
  // normalize numbers (height/weight are already canonical cm/kg)
  d.age=+d.age; d.height=+d.height; d.weight=+d.weight;
  d.bodyFat = d.bodyFat!=="" && d.bodyFat!=null ? +d.bodyFat : null;
  d.units = d.units||"metric";
  const prev = state || {};
  state = {
    profile:d,
    lang: appLang,
    theme: prev.theme || (matchMediaDark()?"dark":"light"),
    progress: prev.progress || {},
    weightLog: prev.weightLog || [{date:todayKey(), kg:d.weight}],
    checklist: []
  };
  rebuildPlan();
  saveState();
  $("#onboarding").classList.remove("active");
  document.documentElement.setAttribute("data-theme",state.theme);
  go("today"); renderAll(); applyStaticI18n();
  toast(t("toast_ready"));
}

function matchMediaDark(){ try{ return window.matchMedia("(prefers-color-scheme: dark)").matches; }catch(e){ return false; } }

/* =========================================================================
   BOOT
   ========================================================================= */
function boot(){
  appLang = (state && state.lang) ? state.lang : defaultLang();
  applyStaticI18n();
  if(state && state.profile){
    document.documentElement.setAttribute("data-theme", state.theme||"light");
    if(!state.checklist || !state.checklist.length) rebuildPlan();
    renderAll(); go("today");
  } else {
    startOnboarding(null);
  }
  // register service worker only when served over http(s) — silently skip on file://
  if("serviceWorker" in navigator && location.protocol.startsWith("http")){
    navigator.serviceWorker.register("sw.js").catch(()=>{});
  }
}
boot();
</script>
